# Purpose: Nightly cron sentinel — re-runs the verify + both-arch reproducibility + build/hardening gates against
# current upstream UBI/RPM state to catch drift.
# Role: gate
# Micro-container candidate: partial — keep cron/matrix glue; share the same pinned gate micro-container as build.yaml
# (removes the copy-paste of its jobs).

name: Nightly base micro sentinel

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-base-micro
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ghcr.io/nwarila/ubi9-base-micro
  RUNTIME_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro
  DEV_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro-dev
  SYFT_VERSION: "1.45.1"
  TRIVY_VERSION: "0.71.0"
  GRYPE_VERSION: "0.115.0"
  SCANNER_DB_MAX_AGE_DAYS: "7"
  SSG_VERSION: "0.1.81"
  SSG_TARBALL_SHA512: "11e26cfa96a6f1bd98b3a131837e2f86c9a9851239337d86d624b01627faf10f7a03c395a5839ddab018e0fa47719ade05a9946f90d5ca96b1261776a9164379"
  STIG_PROFILE: "xccdf_org.nwarila.content_profile_ubi9_base_micro_stig"
  STIG_FAIL_ON: "low"
  STIG_ARF_PREDICATE_TYPE: "https://nwarila.dev/attestations/stig-arf/v1"
  SOURCE_DATE_EPOCH: "1704067200"
  OCI_CREATED: "2024-01-01T00:00:00Z"
  UBI_MICRO_IMAGE: registry.access.redhat.com/ubi9/ubi-micro@sha256:35de56a9413112f1474e392ebc35e0cf6f0fb484c8e8877bbae59b513694b41f

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0; bundles actionlint 1.7.12
        with:
          fail_level: error
          reporter: github-check

  verify:
    name: repo contract
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify repository contract
        run: |
          python tools/verify.py
          python tools/assert-sbom-rpms.py --self-test
          python tools/assert-footprint.py --self-test
          python tools/assert-no-phantom-packages.py --self-test
          python tools/assert-reproducible.py --self-test
          python tools/assert-rpm-lock-hashes.py --self-test
          bash tools/generate-rpm-lock.sh --self-test
          python tools/assert-scanner-db-freshness.py --self-test
          python tools/assert-vex.py --self-test
          python tools/assert-no-rootfs-secrets.py --self-test
          python tools/generate-nist-800-190-predicate.py --self-test
          python tools/assert-slsa-builder-id.py --self-test
          python tools/assert-stig-tailoring.py --self-test
          python tools/assert-rootfs-identity.py --self-test
          python tools/assert-stig-arf.py --self-test
          python tools/generate-stig-arf-predicate.py --self-test

      - name: Check shell script syntax
        run: |
          bash -n tests/hardening.sh
          bash tests/hardening.sh --self-test
          bash -n tests/fips.sh
          bash -n tools/install-trivy.sh
          bash -n tools/install-grype.sh
          bash -n tools/build.sh
          bash -n tools/run-test-gates.sh
          bash -n tools/fetch-runtime-rpms.sh
          bash -n tools/generate-rpm-lock.sh
          bash -n tools/install-syft.sh
          bash -n tools/install-openscap.sh
          bash -n tools/build-stig-datastream.sh
          bash -n tools/run-stig-arf.sh

  reproducibility-gate:
    name: reproducibility gate (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: amd64,arm64
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build twice and assert rootfs byte identity
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          python tools/assert-reproducible.py \
            --platform "${PLATFORM}" \
            --assert-byte-identical \
            --expect-from-contract "contracts/image-manifest.json" \
            --report "dist/reproducibility/base-micro.${ARCH}.reproducibility.json" \
            --summary "dist/reproducibility/base-micro.${ARCH}.reproducibility.txt" \
            --workdir "dist/reproducibility/work.${ARCH}"
          cat "dist/reproducibility/base-micro.${ARCH}.reproducibility.txt"

      - name: Emit reproducibility decision envelope
        if: ${{ always() }}
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          python3 tools/summarize-gates.py \
            --kind repro \
            --arch "${ARCH}" \
            --contract contracts/image-manifest.json \
            --output "dist/summary/base-micro.${ARCH}.repro.json"

      - name: Upload reproducibility decision envelope
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-decision-repro-${{ matrix.arch }}
          path: dist/summary/base-micro.${{ matrix.arch }}.repro.json
          if-no-files-found: error
          retention-days: 7

  hardening:
    name: hardening (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    env:
      PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: amd64,arm64
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.5.2

      - name: Run full test-only gate set
        run: bash tools/run-test-gates.sh

      - name: Emit hardening decision envelope
        if: ${{ always() }}
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          python3 tools/summarize-gates.py \
            --kind hardening \
            --arch "${ARCH}" \
            --contract contracts/image-manifest.json \
            --output "dist/summary/base-micro.${ARCH}.hardening.json"

      - name: Upload hardening decision envelope
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-decision-hardening-${{ matrix.arch }}
          path: dist/summary/base-micro.${{ matrix.arch }}.hardening.json
          if-no-files-found: error
          retention-days: 7

  build:
    name: build and hardening
    runs-on: ubuntu-24.04
    needs: hardening
    if: ${{ always() }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Assert hardening matrix succeeded
        run: |
          if [ "${{ needs.hardening.result }}" != "success" ]; then
            echo "hardening matrix result: ${{ needs.hardening.result }}"
            exit 1
          fi

  alert:
    name: nightly drift alert
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - hardening
      - build
      - reproducibility-gate
    if: ${{ always() && github.event_name != 'pull_request' }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download all four nightly decision envelopes
        if: ${{ always() }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nightly-decision-*
          path: dist/summary
          merge-multiple: true

      - name: Capture nightly job results and run context
        if: ${{ always() }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p dist/nightly-alert
          jq -n \
            --arg hardening "${{ needs.hardening.result }}" \
            --arg build "${{ needs.build.result }}" \
            --arg reproducibility "${{ needs.reproducibility-gate.result }}" \
            '{
              hardening: $hardening,
              build: $build,
              "reproducibility-gate": $reproducibility
            }' > dist/nightly-alert/job-results.json
          jq -n \
            --arg run_url "${RUN_URL}" \
            --arg date "$(date -u +%F)" \
            '{run_url: $run_url, date: $date}' > dist/nightly-alert/run-context.json

      - name: Render nightly drift issue
        if: ${{ always() }}
        run: |
          python3 tools/render-drift-issue.py \
            --hardening-amd64 dist/summary/base-micro.amd64.hardening.json \
            --hardening-arm64 dist/summary/base-micro.arm64.hardening.json \
            --repro-amd64 dist/summary/base-micro.amd64.repro.json \
            --repro-arm64 dist/summary/base-micro.arm64.repro.json \
            --job-results dist/nightly-alert/job-results.json \
            --run-context dist/nightly-alert/run-context.json \
            --body-output dist/nightly-alert/issue-body.md \
            --decision-output dist/nightly-alert/decision.json

      - name: Log nightly drift decision
        if: ${{ always() }}
        run: |
          cat dist/nightly-alert/decision.json
          cat dist/nightly-alert/issue-body.md
          cat dist/nightly-alert/issue-body.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Maintain sticky nightly drift issue
        if: ${{ always() }}
        env:
          BODY_FILE: dist/nightly-alert/issue-body.md
          DECISION_FILE: dist/nightly-alert/decision.json
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: "Nightly drift: base-micro security sentinel"
          MARKER: "<!-- ubi9-base-micro-nightly-drift:v1 -->"
          OWNER: NWarila
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          alert_dir=dist/nightly-alert
          attention="$(jq -er '.attention | if . then "true" else "false" end' "${DECISION_FILE}")"
          run_date="$(jq -er '.date' "${alert_dir}/run-context.json")"

          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues?state=all&per_page=100" \
            > "${alert_dir}/all-issues.json"
          jq \
            --arg bot "github-actions[bot]" \
            --arg marker "${MARKER}" \
            --arg title "${ISSUE_TITLE}" \
            '[.[][] | select(.pull_request == null)
              | select(.user.login == $bot and .title == $title and ((.body // "") | contains($marker)))]' \
            "${alert_dir}/all-issues.json" > "${alert_dir}/matching-issues.json"
          match_count="$(jq -er 'length' "${alert_dir}/matching-issues.json")"
          if [[ "${match_count}" -gt 1 ]]; then
            echo "Multiple matching nightly drift issues found; refusing an ambiguous mutation." >&2
            exit 1
          fi

          if [[ "${attention}" == "true" ]]; then
            jq -n \
              --arg title "${ISSUE_TITLE}" \
              --rawfile body "${BODY_FILE}" \
              --arg owner "${OWNER}" \
              '{title: $title, body: $body, assignees: [$owner]}' \
              > "${alert_dir}/create-issue-request.json"
            jq -n \
              --rawfile body "${BODY_FILE}" \
              --arg owner "${OWNER}" \
              '{body: $body, assignees: [$owner]}' \
              > "${alert_dir}/update-open-issue-request.json"
            jq -n \
              --rawfile body "${BODY_FILE}" \
              --arg owner "${OWNER}" \
              '{body: $body, state: "open", state_reason: "reopened", assignees: [$owner]}' \
              > "${alert_dir}/reopen-issue-request.json"

            if [[ "${match_count}" == "0" ]]; then
              gh api --method POST \
                "repos/${REPOSITORY}/issues" \
                --input "${alert_dir}/create-issue-request.json" \
                > "${alert_dir}/issue-response.json"
              issue_number="$(jq -er '.number' "${alert_dir}/issue-response.json")"
            else
              issue_number="$(jq -er '.[0].number' "${alert_dir}/matching-issues.json")"
              issue_state="$(jq -er '.[0].state' "${alert_dir}/matching-issues.json")"
              if [[ "${issue_state}" == "open" ]]; then
                gh api --method PATCH \
                  "repos/${REPOSITORY}/issues/${issue_number}" \
                  --input "${alert_dir}/update-open-issue-request.json" \
                  > "${alert_dir}/issue-response.json"
              elif [[ "${issue_state}" == "closed" ]]; then
                gh api --method PATCH \
                  "repos/${REPOSITORY}/issues/${issue_number}" \
                  --input "${alert_dir}/reopen-issue-request.json" \
                  > "${alert_dir}/issue-response.json"
              else
                echo "Matching nightly drift issue has unknown state: ${issue_state}" >&2
                exit 1
              fi
            fi

            run_marker="<!-- ubi9-base-micro-nightly-drift-run:${RUN_ID} -->"
            gh api --paginate --slurp \
              "repos/${REPOSITORY}/issues/${issue_number}/comments?per_page=100" \
              > "${alert_dir}/issue-comments.json"
            comment_count="$(jq -r --arg marker "${run_marker}" \
              '[.[][] | select(.user.login == "github-actions[bot]" and ((.body // "") | contains($marker)))]
              | length' "${alert_dir}/issue-comments.json")"
            if [[ "${comment_count}" -gt 1 ]]; then
              echo "Multiple per-run nightly drift comments found; refusing an ambiguous notification." >&2
              exit 1
            fi
            if [[ "${comment_count}" == "0" ]]; then
              jq -n \
                --arg body "@${OWNER} nightly drift needs attention: ${RUN_URL}\n\n${run_marker}" \
                '{body: $body}' > "${alert_dir}/attention-comment-request.json"
              gh api --method POST \
                "repos/${REPOSITORY}/issues/${issue_number}/comments" \
                --input "${alert_dir}/attention-comment-request.json" \
                > "${alert_dir}/comment-response.json"
            fi
          elif [[ "${match_count}" == "1" ]]; then
            issue_number="$(jq -er '.[0].number' "${alert_dir}/matching-issues.json")"
            issue_state="$(jq -er '.[0].state' "${alert_dir}/matching-issues.json")"
            if [[ "${issue_state}" == "open" ]]; then
              jq -n \
                --arg body "resolved: clean on ${run_date}" \
                '{body: $body}' > "${alert_dir}/resolved-comment-request.json"
              jq -n \
                '{state: "closed", state_reason: "completed"}' \
                > "${alert_dir}/close-issue-request.json"
              gh api --method POST \
                "repos/${REPOSITORY}/issues/${issue_number}/comments" \
                --input "${alert_dir}/resolved-comment-request.json" \
                > "${alert_dir}/resolved-comment-response.json"
              gh api --method PATCH \
                "repos/${REPOSITORY}/issues/${issue_number}" \
                --input "${alert_dir}/close-issue-request.json" \
                > "${alert_dir}/close-issue-response.json"
            elif [[ "${issue_state}" != "closed" ]]; then
              echo "Matching nightly drift issue has unknown state: ${issue_state}" >&2
              exit 1
            fi
          fi
