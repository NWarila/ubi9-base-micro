name: Build base micro

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-base-micro-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: ghcr.io/nwarila/ubi9-base-micro
  RUNTIME_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro
  DEV_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro-dev
  PLATFORM: linux/amd64
  SYFT_VERSION: "1.45.1"
  TRIVY_VERSION: "0.71.0"
  GRYPE_VERSION: "0.87.0"
  SSG_VERSION: "0.1.81"
  SSG_TARBALL_SHA512: "11e26cfa96a6f1bd98b3a131837e2f86c9a9851239337d86d624b01627faf10f7a03c395a5839ddab018e0fa47719ade05a9946f90d5ca96b1261776a9164379"
  STIG_PROFILE: "xccdf_org.nwarila.content_profile_ubi9_base_micro_stig"
  STIG_FAIL_ON: "low"
  STIG_ARF_PREDICATE_TYPE: "https://nwarila.dev/attestations/stig-arf/v1"
  SOURCE_DATE_EPOCH: "1704067200"
  OCI_CREATED: "2024-01-01T00:00:00Z"
  UBI_MICRO_IMAGE: registry.access.redhat.com/ubi9/ubi-micro@sha256:b498b3ea26111ab4b81d65139f2ebd2ef9a2abb7a4588b7fdcc54889f95e9caa

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  verify:
    name: repo contract
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify repository contract
        run: |
          python tools/verify.py
          python tools/assert-sbom-rpms.py --self-test
          python tools/assert-footprint.py --self-test
          python tools/assert-no-phantom-packages.py --self-test
          python tools/assert-reproducible.py --self-test
          bash tools/assert-rpm-lock-hashes.sh --self-test
          bash tools/generate-rpm-lock.sh --self-test
          python tools/assert-vex.py --self-test
          python tools/assert-no-rootfs-secrets.py --self-test
          python tools/generate-nist-800-190-predicate.py --self-test
          python tools/assert-slsa-builder-id.py --self-test
          python tools/assert-stig-tailoring.py --self-test
          python tools/assert-rootfs-identity.py --self-test
          python tools/assert-stig-arf.py --self-test
          python tools/generate-stig-arf-predicate.py --self-test

      - name: Check shell script syntax
        run: |
          bash -n tests/hardening.sh
          bash -n tests/fips.sh
          bash -n tools/install-trivy.sh
          bash -n tools/install-grype.sh
          bash -n tools/build.sh
          bash -n tools/run-test-gates.sh
          bash -n tools/assert-rpm-lock-hashes.sh
          bash -n tools/generate-rpm-lock.sh
          bash -n tools/install-syft.sh
          bash -n tools/install-openscap.sh
          bash -n tools/build-stig-datastream.sh
          bash -n tools/run-stig-arf.sh

  reproducibility-gate:
    name: reproducibility gate (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build twice and assert rootfs byte identity
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          python tools/assert-reproducible.py \
            --platform "${PLATFORM}" \
            --assert-byte-identical \
            --report "dist/reproducibility/base-micro.${ARCH}.reproducibility.json" \
            --summary "dist/reproducibility/base-micro.${ARCH}.reproducibility.txt" \
            --workdir "dist/reproducibility/work.${ARCH}"
          cat "dist/reproducibility/base-micro.${ARCH}.reproducibility.txt"

  build:
    name: build and hardening
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Run full test-only gate set
        run: bash tools/run-test-gates.sh
