name: Build base micro

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-base-micro-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: ghcr.io/nwarila/ubi9-base-micro
  RUNTIME_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro
  DEV_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro-dev
  PLATFORM: linux/amd64
  SYFT_VERSION: "1.45.1"
  TRIVY_VERSION: "0.71.0"
  GRYPE_VERSION: "0.87.0"
  SSG_VERSION: "0.1.81"
  SSG_TARBALL_SHA512: "11e26cfa96a6f1bd98b3a131837e2f86c9a9851239337d86d624b01627faf10f7a03c395a5839ddab018e0fa47719ade05a9946f90d5ca96b1261776a9164379"
  STIG_PROFILE: "xccdf_org.nwarila.content_profile_ubi9_base_micro_stig"
  STIG_FAIL_ON: "low"
  STIG_ARF_PREDICATE_TYPE: "https://nwarila.dev/attestations/stig-arf/v1"
  UBI_MICRO_IMAGE: registry.access.redhat.com/ubi9/ubi-micro@sha256:b498b3ea26111ab4b81d65139f2ebd2ef9a2abb7a4588b7fdcc54889f95e9caa

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  verify:
    name: repo contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify repository contract
        run: |
          python tools/verify.py
          python tools/assert-sbom-rpms.py --self-test
          python tools/assert-footprint.py --self-test
          python tools/assert-vex.py --self-test
          python tools/assert-no-rootfs-secrets.py --self-test
          python tools/generate-nist-800-190-predicate.py --self-test
          python tools/assert-slsa-builder-id.py --self-test
          python tools/assert-stig-tailoring.py --self-test
          python tools/assert-rootfs-identity.py --self-test
          python tools/assert-stig-arf.py --self-test
          python tools/generate-stig-arf-predicate.py --self-test

      - name: Check shell script syntax
        run: |
          bash -n tests/hardening.sh
          bash -n tests/fips.sh
          bash -n tools/install-trivy.sh
          bash -n tools/install-grype.sh
          bash -n tools/build.sh
          bash -n tools/install-syft.sh
          bash -n tools/install-openscap.sh
          bash -n tools/build-stig-datastream.sh
          bash -n tools/run-stig-arf.sh

  build:
    name: build and hardening
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Install Syft for rpmdb enumeration
        run: bash tools/install-syft.sh

      - name: Install Trivy for vulnerability gates
        run: bash tools/install-trivy.sh

      - name: Install Grype for vulnerability gates
        run: bash tools/install-grype.sh

      - name: Install OpenSCAP STIG tooling
        run: bash tools/install-openscap.sh

      - name: Build RHEL9 STIG datastream
        run: bash tools/build-stig-datastream.sh

      - name: Build runtime and development images
        run: bash tools/build.sh

      - name: Run runtime hardening gate
        run: bash tests/hardening.sh "${RUNTIME_IMAGE}"

      - name: Run runtime FIPS artifact gate
        run: bash tests/fips.sh "${RUNTIME_IMAGE}"

      - name: Run runtime footprint gate
        run: |
          set -euo pipefail

          arch="${PLATFORM#linux/}"
          mkdir -p dist/footprint
          python tools/assert-footprint.py \
            --image "${RUNTIME_IMAGE}" \
            --platform "${PLATFORM}" \
            --output "dist/footprint/base-micro.${arch}.json"

      - name: Run tailored STIG ARF gate
        run: bash tools/run-stig-arf.sh "${RUNTIME_IMAGE}" "${PLATFORM#linux/}" "${PLATFORM}" "dist/stig/${PLATFORM#linux/}"

      - name: Generate and verify runtime SBOMs
        run: |
          set -euo pipefail

          sbom_arch="${PLATFORM#linux/}"
          mkdir -p dist/sbom

          dist/tools/syft scan "${RUNTIME_IMAGE}" \
            --platform "${PLATFORM}" \
            -o "json=dist/sbom/base-micro.${sbom_arch}.syft.json" \
            -o "spdx-json=dist/sbom/base-micro.${sbom_arch}.spdx.json" \
            -o "cyclonedx-json=dist/sbom/base-micro.${sbom_arch}.cdx.json"

          python tools/assert-sbom-rpms.py \
            --source "dist/sbom/base-micro.${sbom_arch}.syft.json" \
            "dist/sbom/base-micro.${sbom_arch}.spdx.json" \
            "dist/sbom/base-micro.${sbom_arch}.cdx.json"

      - name: Run Trivy fixable vulnerability gate
        run: |
          set -euo pipefail

          dist/tools/trivy image \
            --vuln-type os,library \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "${RUNTIME_IMAGE}"

      - name: Run Grype fixable vulnerability gate
        run: |
          set -euo pipefail

          dist/tools/grype "${RUNTIME_IMAGE}" --only-fixed --fail-on high

      - name: Run OpenVEX default-deny gate
        run: |
          set -euo pipefail

          sbom_arch="${PLATFORM#linux/}"
          mkdir -p dist/vuln
          trivy_json="dist/vuln/base-micro.${sbom_arch}.trivy.all.json"
          grype_json="dist/vuln/base-micro.${sbom_arch}.grype.all.json"

          dist/tools/trivy image \
            --vuln-type os,library \
            --severity HIGH,CRITICAL \
            --format json \
            --output "${trivy_json}" \
            "${RUNTIME_IMAGE}"

          dist/tools/grype "${RUNTIME_IMAGE}" -o json --file "${grype_json}"

          python tools/assert-vex.py \
            --product "${RUNTIME_IMAGE}" \
            --trivy-json "${trivy_json}" \
            --grype-json "${grype_json}"

      - name: Run runtime rootfs secret gate
        run: |
          set -euo pipefail

          arch="${PLATFORM#linux/}"
          rootfs_dir="dist/rootfs-secret-scan/rootfs.${arch}"
          report="dist/rootfs-secret-scan/base-micro.${arch}.secret-scan.json"
          rm -rf "${rootfs_dir}"
          mkdir -p "${rootfs_dir}"

          container_id="$(docker create "${RUNTIME_IMAGE}" /secret-scan-export)"
          cleanup() {
            docker rm "${container_id}" >/dev/null
          }
          trap cleanup EXIT

          docker export "${container_id}" | tar --no-same-owner --no-same-permissions -x -C "${rootfs_dir}"
          chmod -R u+rwX "${rootfs_dir}"
          python tools/assert-no-rootfs-secrets.py \
            --rootfs "${rootfs_dir}" \
            --report "${report}"

      - name: Generate and validate NIST SP 800-190 predicate
        run: |
          set -euo pipefail

          arch="${PLATFORM#linux/}"
          predicate="dist/attestations/nist-800-190.base-micro.${arch}.json"
          mkdir -p dist/attestations

          python tools/generate-nist-800-190-predicate.py \
            --image-ref "${RUNTIME_IMAGE}" \
            --platform "${PLATFORM}" \
            --arch "${arch}" \
            --base-image "${UBI_MICRO_IMAGE}" \
            --source-uri "github.com/${GITHUB_REPOSITORY}" \
            --revision "${GITHUB_SHA}" \
            --secret-scan-report "dist/rootfs-secret-scan/base-micro.${arch}.secret-scan.json" \
            --output "${predicate}"

          python tools/generate-nist-800-190-predicate.py --validate "${predicate}"
