# Purpose: PR/push/tag CI — actionlint, repo-contract + shell-syntax self-tests, both-arch byte-identical
# reproducibility gate, and the full test-only hardening gate set.
# Role: gate
# Micro-container candidate: partial — keep triggers/matrix/runner-harden as workflow glue; move the
# verify/reproducibility/hardening gate logic into a pinned micro-container action.

name: Build base micro

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-base-micro-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: ghcr.io/nwarila/ubi9-base-micro
  RUNTIME_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro
  DEV_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro-dev
  SYFT_VERSION: "1.45.1"
  TRIVY_VERSION: "0.71.0"
  GRYPE_VERSION: "0.115.0"
  SCANNER_DB_MAX_AGE_DAYS: "7"
  SSG_VERSION: "0.1.81"
  SSG_TARBALL_SHA512: "11e26cfa96a6f1bd98b3a131837e2f86c9a9851239337d86d624b01627faf10f7a03c395a5839ddab018e0fa47719ade05a9946f90d5ca96b1261776a9164379"
  STIG_PROFILE: "xccdf_org.nwarila.content_profile_ubi9_base_micro_stig"
  STIG_FAIL_ON: "low"
  STIG_ARF_PREDICATE_TYPE: "https://nwarila.dev/attestations/stig-arf/v1"
  SOURCE_DATE_EPOCH: "1704067200"
  OCI_CREATED: "2024-01-01T00:00:00Z"
  UBI_MICRO_IMAGE: registry.access.redhat.com/ubi9/ubi-micro@sha256:35de56a9413112f1474e392ebc35e0cf6f0fb484c8e8877bbae59b513694b41f

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0; bundles actionlint 1.7.12
        with:
          fail_level: error
          reporter: github-check

  verify:
    name: repo contract
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify repository contract
        run: |
          python tools/verify.py
          python tools/assert-sbom-rpms.py --self-test
          python tools/assert-footprint.py --self-test
          python tools/assert-no-phantom-packages.py --self-test
          python tools/assert-reproducible.py --self-test
          python tools/assert-rpm-lock-hashes.py --self-test
          bash tools/generate-rpm-lock.sh --self-test
          python tools/assert-scanner-db-freshness.py --self-test
          python tools/assert-vex.py --self-test
          python tools/assert-no-rootfs-secrets.py --self-test
          python tools/generate-nist-800-190-predicate.py --self-test
          python tools/assert-slsa-builder-id.py --self-test
          python tools/assert-stig-tailoring.py --self-test
          python tools/assert-rootfs-identity.py --self-test
          python tools/assert-stig-arf.py --self-test
          python tools/generate-stig-arf-predicate.py --self-test

      - name: Check shell script syntax
        run: |
          bash -n tests/hardening.sh
          bash tests/hardening.sh --self-test
          bash -n tests/fips.sh
          bash -n tools/install-trivy.sh
          bash -n tools/install-grype.sh
          bash -n tools/build.sh
          bash -n tools/run-test-gates.sh
          bash -n tools/fetch-runtime-rpms.sh
          bash -n tools/generate-rpm-lock.sh
          bash -n tools/install-syft.sh
          bash -n tools/install-openscap.sh
          bash -n tools/build-stig-datastream.sh
          bash -n tools/run-stig-arf.sh

  reproducibility-gate:
    name: reproducibility gate (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: amd64,arm64
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build twice and assert rootfs byte identity
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          python tools/assert-reproducible.py \
            --platform "${PLATFORM}" \
            --assert-byte-identical \
            --expect-from-contract "contracts/image-manifest.json" \
            --report "dist/reproducibility/base-micro.${ARCH}.reproducibility.json" \
            --summary "dist/reproducibility/base-micro.${ARCH}.reproducibility.txt" \
            --workdir "dist/reproducibility/work.${ARCH}"
          cat "dist/reproducibility/base-micro.${ARCH}.reproducibility.txt"

      - name: Emit reproducibility decision envelope
        if: ${{ always() }}
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          python3 tools/summarize-gates.py \
            --kind repro \
            --arch "${ARCH}" \
            --contract contracts/image-manifest.json \
            --output "dist/summary/base-micro.${ARCH}.repro.json"

      - name: Upload reproducibility decision envelope
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: decision-repro-${{ matrix.arch }}
          path: dist/summary/base-micro.${{ matrix.arch }}.repro.json
          if-no-files-found: error
          retention-days: 7

  hardening:
    name: hardening (${{ matrix.arch }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    env:
      PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: amd64,arm64
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.5.2

      - name: Run full test-only gate set
        run: bash tools/run-test-gates.sh

      - name: Emit hardening decision envelope
        if: ${{ always() }}
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          python3 tools/summarize-gates.py \
            --kind hardening \
            --arch "${ARCH}" \
            --contract contracts/image-manifest.json \
            --output "dist/summary/base-micro.${ARCH}.hardening.json"

      - name: Upload hardening decision envelope
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: decision-hardening-${{ matrix.arch }}
          path: dist/summary/base-micro.${{ matrix.arch }}.hardening.json
          if-no-files-found: error
          retention-days: 7

  build:
    name: build and hardening
    runs-on: ubuntu-24.04
    needs: hardening
    if: ${{ always() }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Assert hardening matrix succeeded
        run: |
          if [ "${{ needs.hardening.result }}" != "success" ]; then
            echo "hardening matrix result: ${{ needs.hardening.result }}"
            exit 1
          fi

  decision-surface:
    name: PR decision surface
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - reproducibility-gate
      - hardening
      - build
    if: ${{ always() && github.event_name == 'pull_request' }}
    permissions:
      contents: read
      checks: read
      statuses: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download decision envelopes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: decision-*
          path: dist/summary
          merge-multiple: true

      - name: Capture PR context
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p dist/decision
          jq \
            --arg head_sha "${{ github.event.pull_request.head.sha }}" \
            --arg run_url "${RUN_URL}" \
            '{
              title: .pull_request.title,
              number: .pull_request.number,
              changed_files: ((.pull_request.changed_files | tostring) + " changed file(s)"),
              head_sha: $head_sha,
              run_url: $run_url
            }' "${GITHUB_EVENT_PATH}" > dist/decision/pr-context.json

      - name: Capture required-check snapshot
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -u
          mkdir -p dist/decision
          required=dist/decision/required-contexts.json
          contexts=dist/decision/check-contexts.json
          snapshot=dist/decision/check-snapshot.json
          printf '[]\n' > "${required}"
          printf '[]\n' > "${contexts}"
          api_error=""

          if ! gh api --paginate --slurp \
            "repos/${REPOSITORY}/rulesets?includes_parents=true&per_page=100" \
            > dist/decision/rulesets.json; then
            api_error="active Pull Request Gate ruleset query failed"
          else
            if ! ruleset_count="$(jq \
              '[.[][] | select(.name == "Pull Request Gate" and .enforcement == "active")] | length' \
              dist/decision/rulesets.json)"; then
              api_error="active Pull Request Gate ruleset response is malformed"
            elif [[ "${ruleset_count}" != "1" ]]; then
              api_error="active Pull Request Gate ruleset is missing or ambiguous"
            elif ! ruleset_url="$(jq -er \
              '.[][] | select(.name == "Pull Request Gate" and .enforcement == "active") | ._links.self.href' \
              dist/decision/rulesets.json)"; then
              api_error="active Pull Request Gate ruleset URL is missing"
            else
              if ! gh api "${ruleset_url}" > dist/decision/ruleset.json; then
                api_error="active Pull Request Gate ruleset detail query failed"
              elif ! jq -e \
                '[.rules[] | select(.type == "required_status_checks") | .parameters.required_status_checks[]?.context]
                 | unique | select(length > 0)' \
                dist/decision/ruleset.json > "${required}"; then
                api_error="active Pull Request Gate ruleset has no required contexts"
              fi
            fi
          fi

          capture_contexts() {
            if ! gh api --paginate --slurp \
              "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
              > dist/decision/check-runs.json; then
              return 1
            fi
            if ! gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}/status" \
              > dist/decision/status-rollup.json; then
              return 1
            fi
            if ! jq '[.[] | .check_runs[]? | {
                        context: .name,
                        conclusion: (.conclusion // .status),
                        source: "check"
                      }]' dist/decision/check-runs.json > dist/decision/check-run-contexts.json; then
              return 1
            fi
            if ! jq -s '.[0] + (.[1].statuses | map({context: .context, conclusion: .state, source: "status"}))' \
              dist/decision/check-run-contexts.json dist/decision/status-rollup.json > "${contexts}"; then
              return 1
            fi
          }

          if [[ -z "${api_error}" ]]; then
            for attempt in 1 2 3 4 5 6; do
              if ! capture_contexts; then
                api_error="check/status rollup query failed"
                break
              fi
              if ! jq -e --slurpfile required "${required}" '
                [. as $contexts | $required[0][] as $name
                 | [$contexts[] | select(.context == $name)] as $matches
                 | select(($matches | length) == 0
                     or any($matches[];
                       .conclusion == "pending"
                       or .conclusion == "queued"
                       or .conclusion == "in_progress"))]
                | length > 0' "${contexts}" > /dev/null; then
                break
              fi
              if [[ "${attempt}" != "6" ]]; then
                sleep 15
              fi
            done
          fi

          jq -n \
            --arg api_error "${api_error}" \
            --arg head_sha "${HEAD_SHA}" \
            --slurpfile required "${required}" \
            --slurpfile contexts "${contexts}" \
            '{
              api_error: (if $api_error == "" then null else $api_error end),
              head_sha: $head_sha,
              required_contexts: $required[0],
              contexts: $contexts[0]
            }' > "${snapshot}"

      - name: Render PR decision
        run: |
          python3 tools/render-pr-decision.py \
            --hardening-amd64 dist/summary/base-micro.amd64.hardening.json \
            --hardening-arm64 dist/summary/base-micro.arm64.hardening.json \
            --repro-amd64 dist/summary/base-micro.amd64.repro.json \
            --repro-arm64 dist/summary/base-micro.arm64.repro.json \
            --pr-context dist/decision/pr-context.json \
            --check-snapshot dist/decision/check-snapshot.json \
            --output dist/decision/pr-comment.md

      - name: Log PR decision
        run: |
          cat dist/decision/pr-comment.md
          cat dist/decision/pr-comment.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Post or update sticky PR decision
        env:
          BODY_FILE: dist/decision/pr-comment.md
          GH_TOKEN: ${{ github.token }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          MARKER: "<!-- ubi9-base-micro-pr-decision:v1 -->"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [[ "${HEAD_REPOSITORY}" != "${REPOSITORY}" ]]; then
            echo "Fork PR trust boundary: sticky comment write skipped; rendered body is logged above."
            exit 0
          fi

          gh api --paginate --slurp \
            "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            > dist/decision/issue-comments.json
          match_count="$(jq --arg marker "${MARKER}" \
            '[.[][] | select(.user.login == "github-actions[bot]" and (.body | contains($marker)))] | length' \
            dist/decision/issue-comments.json)"
          if [[ "${match_count}" -gt 1 ]]; then
            echo "Multiple github-actions[bot] sticky decision comments found; refusing an ambiguous update." >&2
            exit 1
          fi

          jq -n --rawfile body "${BODY_FILE}" '{body: $body}' > dist/decision/comment-request.json
          if [[ "${match_count}" == "1" ]]; then
            comment_id="$(jq -r --arg marker "${MARKER}" \
              '.[][] | select(.user.login == "github-actions[bot]" and (.body | contains($marker))) | .id' \
              dist/decision/issue-comments.json)"
            gh api --method PATCH \
              "repos/${REPOSITORY}/issues/comments/${comment_id}" \
              --input dist/decision/comment-request.json
          else
            gh api --method POST \
              "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --input dist/decision/comment-request.json
          fi
