name: Build base micro

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-base-micro-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REPOSITORY: ghcr.io/nwarila/ubi9-base-micro
  RUNTIME_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro
  DEV_IMAGE: ghcr.io/nwarila/ubi9-base-micro:base-micro-dev
  PLATFORM: linux/amd64
  SYFT_VERSION: "1.45.1"

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  verify:
    name: repo contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify repository contract
        run: python tools/verify.py

      - name: Check shell script syntax
        run: |
          bash -n tests/hardening.sh
          bash -n tools/build.sh
          bash -n tools/install-syft.sh

  build:
    name: build and hardening
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Install Syft for rpmdb enumeration
        run: bash tools/install-syft.sh

      - name: Build runtime and development images
        run: bash tools/build.sh

      - name: Run runtime hardening gate
        run: bash tests/hardening.sh "${RUNTIME_IMAGE}"
