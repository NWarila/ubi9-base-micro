# Purpose: Release pipeline — SLSA-tag integrity, multi-arch buildx build+push, Cosign sign/verify, SBOM + CVE +
# OpenVEX + NIST-800-190 + STIG-ARF attest/verify, SLSA L3 provenance, Rekor roll-up.
# Role: workflow
# Micro-container candidate: partial — sign/attest spine + OIDC + SLSA reusable stay as workflow; fold the per-arch
# SBOM/CVE/VEX/predicate/verify loops into pinned micro-container actions.

name: Publish image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  IMAGE_REPOSITORY: ghcr.io/nwarila/ubi9-base-micro
  SLSA_GENERATOR_TAG: "v2.1.0"
  SLSA_GENERATOR_TAG_SHA: "f7dd8c54c2067bafc12ca7a55595d5ee9b75204a"
  SYFT_VERSION: "1.45.1"
  TRIVY_VERSION: "0.71.0"
  GRYPE_VERSION: "0.115.0"
  CRANE_VERSION: "v0.21.7"
  SCANNER_DB_MAX_AGE_DAYS: "7"
  UBI_MINIMAL_IMAGE: registry.access.redhat.com/ubi9/ubi-minimal@sha256:463cae32c6f6f5594b11a5c22de275016bd8545ce58a6373388e8b24f13fc15c
  UBI_MICRO_IMAGE: registry.access.redhat.com/ubi9/ubi-micro@sha256:35de56a9413112f1474e392ebc35e0cf6f0fb484c8e8877bbae59b513694b41f
  OPENSSL_FIPS_MODULE_VERSION: "3.0.7-395c1a240fbfffd8"
  OPENSSL_FIPS_PROVIDER_NEVRA: "openssl-fips-provider-so-3.0.7-8.el9"
  OPENSSL_FIPS_PROVIDER_RPM_BASE_URL: "https://cdn-ubi.redhat.com/content/public/ubi/dist/ubi9/9"
  OPENSSL_FIPS_PROVIDER_RPM_SHA256_X86_64: "bbf25303def8e1270675531c47bdad432f6ad8ef4c327556ae65bd6abaf8edb5"
  OPENSSL_FIPS_PROVIDER_RPM_SHA256_AARCH64: "0cfe7b281ae2ca3cb0ceaa1a0b84f8c087c4ac16662ebb9c19b5681cf39f99a9"
  OPENSSL_FIPS_PROVIDER_SO_RPM_SHA256_X86_64: "ab48d98504fae6f8636de027a1ee06d21d5e9c27b7beb247017a6fe55567c5e9"
  OPENSSL_FIPS_PROVIDER_SO_RPM_SHA256_AARCH64: "18c77b9b37e7abf0e8cf1dac4b3de770efe895547bdcab8aea8d8d8592954947"
  SOURCE_DATE_EPOCH: "1704067200"
  OCI_CREATED: "2024-01-01T00:00:00Z"
  NIST_800_190_PREDICATE_TYPE: "https://nwarila.dev/attestations/nist-sp-800-190-image/v1"
  STIG_ARF_PREDICATE_TYPE: "https://nwarila.dev/attestations/stig-arf/v1"
  SSG_VERSION: "0.1.81"
  SSG_TARBALL_SHA512: "11e26cfa96a6f1bd98b3a131837e2f86c9a9851239337d86d624b01627faf10f7a03c395a5839ddab018e0fa47719ade05a9946f90d5ca96b1261776a9164379"
  STIG_PROFILE: "xccdf_org.nwarila.content_profile_ubi9_base_micro_stig"
  STIG_FAIL_ON: "low"

jobs:
  slsa-generator-tag-integrity:
    name: slsa generator tag integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Verify SLSA generator tag binding
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          actual="$(
            gh api "repos/slsa-framework/slsa-github-generator/git/ref/tags/${SLSA_GENERATOR_TAG}" \
              --jq '.object.sha'
          )"
          printf 'slsa-framework/slsa-github-generator refs/tags/%s -> %s\n' \
            "${SLSA_GENERATOR_TAG}" \
            "${actual}"

          if [[ "${actual}" != "${SLSA_GENERATOR_TAG_SHA}" ]]; then
            printf 'SLSA generator tag drift: expected %s, got %s\n' \
              "${SLSA_GENERATOR_TAG_SHA}" \
              "${actual}" >&2
            exit 1
          fi

  publish:
    name: publish signed image
    needs: slsa-generator-tag-integrity
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.image.outputs.digest }}
      ref: ${{ steps.image.outputs.ref }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.5.2

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
          REGISTRY_USER: ${{ github.actor }}
        run: |
          printf '%s' "${GHCR_TOKEN}" \
            | docker login ghcr.io \
                --username "${REGISTRY_USER}" \
                --password-stdin

      - name: Build and push runtime image
        id: image
        run: |
          set -euo pipefail

          mkdir -p dist
          short_sha="${GITHUB_SHA::12}"
          image="${IMAGE_REPOSITORY}"
          tags=(
            --tag "${image}:base-micro-${short_sha}"
          )

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ref_tag="$(printf '%s' "${GITHUB_REF_NAME}" \
              | tr '[:upper:]/' '[:lower:]-' \
              | tr -cd 'a-z0-9_.-')"
            test -n "${ref_tag}"
            tags+=(--tag "${image}:${ref_tag}")
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=(--tag "${image}:base-micro")
          else
            printf 'Unexpected publish ref: %s\n' "${GITHUB_REF}" >&2
            exit 1
          fi

          oci_created="${OCI_CREATED}"
          oci_version="$(tr -d '[:space:]' < VERSION)"

          docker buildx build \
            --file containers/Dockerfile \
            --platform linux/amd64,linux/arm64 \
            --target runtime \
            --build-arg "UBI_MINIMAL_IMAGE=${UBI_MINIMAL_IMAGE}" \
            --build-arg "UBI_MICRO_IMAGE=${UBI_MICRO_IMAGE}" \
            --build-arg "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}" \
            --build-arg "OPENSSL_FIPS_MODULE_VERSION=${OPENSSL_FIPS_MODULE_VERSION}" \
            --build-arg "OPENSSL_FIPS_PROVIDER_NEVRA=${OPENSSL_FIPS_PROVIDER_NEVRA}" \
            --build-arg "OPENSSL_FIPS_PROVIDER_RPM_BASE_URL=${OPENSSL_FIPS_PROVIDER_RPM_BASE_URL}" \
            --build-arg "OPENSSL_FIPS_PROVIDER_RPM_SHA256_X86_64=${OPENSSL_FIPS_PROVIDER_RPM_SHA256_X86_64}" \
            --build-arg "OPENSSL_FIPS_PROVIDER_RPM_SHA256_AARCH64=${OPENSSL_FIPS_PROVIDER_RPM_SHA256_AARCH64}" \
            --build-arg "OPENSSL_FIPS_PROVIDER_SO_RPM_SHA256_X86_64=${OPENSSL_FIPS_PROVIDER_SO_RPM_SHA256_X86_64}" \
            --build-arg "OPENSSL_FIPS_PROVIDER_SO_RPM_SHA256_AARCH64=${OPENSSL_FIPS_PROVIDER_SO_RPM_SHA256_AARCH64}" \
            --build-arg "OCI_CREATED=${oci_created}" \
            --build-arg "OCI_REVISION=${GITHUB_SHA}" \
            --build-arg "OCI_SOURCE=https://github.com/${GITHUB_REPOSITORY}" \
            --build-arg "OCI_VERSION=${oci_version}" \
            --annotation "manifest[linux/amd64]:org.nwarila.fips.cmvp.oe-validated=true" \
            --annotation "manifest[linux/amd64]:org.nwarila.fips.module-version=${OPENSSL_FIPS_MODULE_VERSION}" \
            --annotation "manifest[linux/amd64]:org.nwarila.fips.provider-nvr=${OPENSSL_FIPS_PROVIDER_NEVRA}" \
            --annotation "manifest[linux/arm64]:org.nwarila.fips.cmvp.oe-validated=false" \
            --annotation "manifest[linux/arm64]:org.nwarila.fips.module-version=${OPENSSL_FIPS_MODULE_VERSION}" \
            --annotation "manifest[linux/arm64]:org.nwarila.fips.provider-nvr=${OPENSSL_FIPS_PROVIDER_NEVRA}" \
            --provenance=mode=max \
            --sbom=false \
            --metadata-file dist/image-metadata.json \
            --output "type=registry,rewrite-timestamp=true" \
            "${tags[@]}" \
            .

          digest="$(python -c 'import json; print(json.load(open("dist/image-metadata.json"))["containerimage.digest"])')"
          {
            printf 'image=%s\n' "${image}"
            printf 'digest=%s\n' "${digest}"
            printf 'ref=%s@%s\n' "${image}" "${digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve platform image digests
        id: platform_digests
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail

          docker buildx imagetools inspect --raw "${IMAGE_REF}" > dist/image-index.json
          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import json
          import sys

          with open("dist/image-index.json", encoding="utf-8") as handle:
              index = json.load(handle)

          found = {}
          for descriptor in index.get("manifests") or []:
              platform = descriptor.get("platform") or {}
              if platform.get("os") != "linux":
                  continue
              arch = platform.get("architecture")
              digest = descriptor.get("digest")
              if arch in {"amd64", "arm64"} and digest:
                  found[arch] = digest

          missing = sorted({"amd64", "arm64"} - set(found))
          if missing:
              raise SystemExit("missing platform digest(s): " + ", ".join(missing))

          for arch in ("amd64", "arm64"):
              print(f"{arch}_digest={found[arch]}")
          PY

      - name: Install Crane for published rootfs assertions
        run: |
          bash tools/install-crane.sh
          printf '%s\n' "${PWD}/dist/tools" >> "${GITHUB_PATH}"

      - name: Assert published rootfs contracts
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/published-rootfs
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported published rootfs architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            rootfs_tar="dist/published-rootfs/base-micro.${arch}.tar"
            crane export "${IMAGE}@${digest}" "${rootfs_tar}"
            python3.12 tools/assert-reproducible.py \
              --rootfs-tar "${rootfs_tar}" \
              --arch "${arch}" \
              --expect-from-contract contracts/image-manifest.json
          done

      - name: Sign image digest with Cosign
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: cosign sign --recursive "${IMAGE_REF}"

      - name: Verify Cosign signature
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-image.yaml@${{ github.ref }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: |
          cosign verify "${IMAGE_REF}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Install Syft for SBOM attestations
        run: bash tools/install-syft.sh

      - name: Install Trivy for vulnerability gates
        run: bash tools/install-trivy.sh

      - name: Install Grype for vulnerability gates
        run: bash tools/install-grype.sh

      - name: Assert scanner DB freshness
        run: |
          set -euo pipefail

          scanner_db_max_age_days="${SCANNER_DB_MAX_AGE_DAYS}"
          case "${scanner_db_max_age_days}" in
            "" | *[!0-9]*)
              echo "SCANNER_DB_MAX_AGE_DAYS must be a positive integer, got: ${scanner_db_max_age_days}" >&2
              exit 1
              ;;
            *) ;;
          esac
          if ((scanner_db_max_age_days < 1)); then
            echo "SCANNER_DB_MAX_AGE_DAYS must be at least 1" >&2
            exit 1
          fi

          dist/tools/trivy image --download-db-only
          dist/tools/grype db update
          python tools/assert-scanner-db-freshness.py --max-age-days "${scanner_db_max_age_days}"

          {
            printf 'GRYPE_DB_VALIDATE_AGE=true\n'
            printf 'GRYPE_DB_MAX_ALLOWED_BUILT_AGE=%sh\n' "$((scanner_db_max_age_days * 24))"
          } >> "${GITHUB_ENV}"

      - name: Assert scanner content canary
        run: |
          set -euo pipefail

          scanner_canary_fixture="tests/fixtures/scanner-canary/log4shell.cdx.json"
          grype_canary_json="dist/vuln/scanner-canary.grype.json"
          trivy_canary_json="dist/vuln/scanner-canary.trivy.json"
          mkdir -p dist/vuln
          : > "${grype_canary_json}"
          : > "${trivy_canary_json}"
          GRYPE_DB_AUTO_UPDATE=false dist/tools/grype "sbom:${scanner_canary_fixture}" -o json -q \
            > "${grype_canary_json}"
          dist/tools/trivy sbom "${scanner_canary_fixture}" \
            --format json \
            --output "${trivy_canary_json}" \
            --skip-db-update \
            --skip-java-db-update \
            --offline-scan \
            -q
          python tools/assert-scanner-canary.py \
            --grype-json "${grype_canary_json}" \
            --trivy-json "${trivy_canary_json}" \
            --expect-cve CVE-2021-44228

      - name: Assert fixable-CVE ignore scope
        run: python tools/assert-ignore-scope.py

      - name: Install OpenSCAP STIG tooling
        run: bash tools/install-openscap.sh

      - name: Log in to GHCR for OpenSCAP
        env:
          GHCR_TOKEN: ${{ github.token }}
          REGISTRY_USER: ${{ github.actor }}
        run: |
          printf '%s' "${GHCR_TOKEN}" \
            | sudo podman login ghcr.io \
                --username "${REGISTRY_USER}" \
                --password-stdin

      - name: Build RHEL9 STIG datastream
        run: bash tools/build-stig-datastream.sh

      - name: Run tailored STIG ARF gates
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported STIG architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            platform="linux/${arch}"
            image_ref="${IMAGE}@${digest}"
            bash tools/run-stig-arf.sh "${image_ref}" "${arch}" "${platform}" "dist/stig/${arch}"
          done

      - name: Generate and verify rpmdb SBOMs
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/sbom
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64)
                digest="${AMD64_DIGEST}"
                platform="linux/amd64"
                ;;
              arm64)
                digest="${ARM64_DIGEST}"
                platform="linux/arm64"
                ;;
              *)
                echo "unsupported SBOM architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            dist/tools/syft scan "${image_ref}" \
              --platform "${platform}" \
              -o "json=dist/sbom/base-micro.${arch}.syft.json" \
              -o "spdx-json=dist/sbom/base-micro.${arch}.spdx.json" \
              -o "cyclonedx-json=dist/sbom/base-micro.${arch}.cdx.json"

            python tools/assert-sbom-rpms.py \
              --source "dist/sbom/base-micro.${arch}.syft.json" \
              "dist/sbom/base-micro.${arch}.spdx.json" \
              "dist/sbom/base-micro.${arch}.cdx.json"
          done

      - name: Run Trivy fixable vulnerability gates
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          for arch in amd64 arm64; do
            case "${arch}" in
              amd64)
                digest="${AMD64_DIGEST}"
                platform="linux/amd64"
                ;;
              arm64)
                digest="${ARM64_DIGEST}"
                platform="linux/arm64"
                ;;
              *)
                echo "unsupported Trivy architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            dist/tools/trivy image \
              --platform "${platform}" \
              --vuln-type os,library \
              --ignore-unfixed \
              --severity MEDIUM,HIGH,CRITICAL \
              --ignorefile security/cve-ignore.trivyignore.yaml \
              --exit-code 1 \
              "${image_ref}"
          done

      - name: Run Grype fixable vulnerability gates
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/vuln
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported Grype architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            grype_gate_json="dist/vuln/base-micro.${arch}.grype.gate.json"
            dist/tools/grype "${image_ref}" \
              --only-fixed \
              --fail-on medium \
              -c security/cve-ignore.grype.yaml \
              --show-suppressed \
              -o json \
              --file "${grype_gate_json}"
            python tools/assert-ignore-scope.py --grype-report "${grype_gate_json}"
          done

      - name: Run OpenVEX default-deny gates
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/vuln
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64)
                digest="${AMD64_DIGEST}"
                platform="linux/amd64"
                ;;
              arm64)
                digest="${ARM64_DIGEST}"
                platform="linux/arm64"
                ;;
              *)
                echo "unsupported VEX architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            trivy_json="dist/vuln/base-micro.${arch}.trivy.all.json"
            grype_json="dist/vuln/base-micro.${arch}.grype.all.json"

            dist/tools/trivy image \
              --platform "${platform}" \
              --vuln-type os,library \
              --severity HIGH,CRITICAL \
              --format json \
              --output "${trivy_json}" \
              "${image_ref}"

            dist/tools/grype "${image_ref}" -o json --file "${grype_json}"

            python tools/assert-vex.py \
              --product "${image_ref}" \
              --trivy-json "${trivy_json}" \
              --grype-json "${grype_json}"
          done

      - name: Attest rpmdb SBOMs
        env:
          COSIGN_YES: "true"
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported SBOM architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            cosign attest --type spdxjson \
              --predicate "dist/sbom/base-micro.${arch}.spdx.json" \
              "${image_ref}"
            cosign attest --type cyclonedx \
              --predicate "dist/sbom/base-micro.${arch}.cdx.json" \
              "${image_ref}"
          done

      - name: Verify SPDX SBOM attestation
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-image.yaml@${{ github.ref }}
          IMAGE_REF: ${{ steps.image.outputs.image }}@${{ steps.platform_digests.outputs.amd64_digest }}
        run: |
          set -euo pipefail

          cosign verify-attestation --type spdxjson "${IMAGE_REF}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > dist/verified-spdx-attestation.jsonl

          python - dist/verified-spdx-attestation.jsonl dist/verified-spdx-predicate.json <<'PY'
          import base64
          import json
          import sys

          input_path, output_path = sys.argv[1:3]
          raw = open(input_path, encoding="utf-8").read().strip()
          if not raw:
              raise SystemExit("cosign verify-attestation produced no JSON output")

          try:
              loaded = json.loads(raw)
              records = loaded if isinstance(loaded, list) else [loaded]
          except json.JSONDecodeError:
              records = [json.loads(line) for line in raw.splitlines() if line.strip()]

          predicate = None
          for record in records:
              payload = record.get("payload")
              if not payload:
                  continue
              payload += "=" * (-len(payload) % 4)
              statement = json.loads(base64.b64decode(payload))
              candidate = statement.get("predicate")
              if candidate:
                  predicate = candidate
                  break

          if predicate is None:
              raise SystemExit("verified attestation did not contain a predicate")

          with open(output_path, "w", encoding="utf-8") as handle:
              json.dump(predicate, handle, sort_keys=True)
          PY

          python tools/assert-sbom-rpms.py dist/verified-spdx-predicate.json


      - name: Run runtime rootfs secret gates
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/rootfs-secret-scan
          container_id=""
          cleanup() {
            if [[ -n "${container_id}" ]]; then
              docker rm "${container_id}" >/dev/null
            fi
          }
          trap cleanup EXIT

          for arch in amd64 arm64; do
            case "${arch}" in
              amd64)
                digest="${AMD64_DIGEST}"
                platform="linux/amd64"
                ;;
              arm64)
                digest="${ARM64_DIGEST}"
                platform="linux/arm64"
                ;;
              *)
                echo "unsupported secret-scan architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            rootfs_dir="dist/rootfs-secret-scan/rootfs.${arch}"
            report="dist/rootfs-secret-scan/base-micro.${arch}.secret-scan.json"
            rm -rf "${rootfs_dir}"
            mkdir -p "${rootfs_dir}"

            container_id="$(docker create --platform "${platform}" "${image_ref}" /secret-scan-export)"
            docker export "${container_id}" | tar --no-same-owner --no-same-permissions -x -C "${rootfs_dir}"
            chmod -R u+rwX "${rootfs_dir}"
            docker rm "${container_id}" >/dev/null
            container_id=""

            python tools/assert-no-rootfs-secrets.py \
              --rootfs "${rootfs_dir}" \
              --report "${report}"
          done

      - name: Generate NIST SP 800-190 image-control predicates
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/attestations
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64)
                digest="${AMD64_DIGEST}"
                platform="linux/amd64"
                ;;
              arm64)
                digest="${ARM64_DIGEST}"
                platform="linux/arm64"
                ;;
              *)
                echo "unsupported NIST 800-190 architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            predicate="dist/attestations/nist-800-190.base-micro.${arch}.json"
            python tools/generate-nist-800-190-predicate.py \
              --image-ref "${IMAGE}@${digest}" \
              --platform "${platform}" \
              --arch "${arch}" \
              --base-image "${UBI_MICRO_IMAGE}" \
              --source-uri "github.com/${GITHUB_REPOSITORY}" \
              --revision "${GITHUB_SHA}" \
              --secret-scan-report "dist/rootfs-secret-scan/base-micro.${arch}.secret-scan.json" \
              --output "${predicate}"

            python tools/generate-nist-800-190-predicate.py --validate "${predicate}"
          done

      - name: Attest NIST SP 800-190 image-control predicates
        env:
          COSIGN_YES: "true"
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported NIST 800-190 attestation architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            cosign attest --type "${NIST_800_190_PREDICATE_TYPE}" \
              --predicate "dist/attestations/nist-800-190.base-micro.${arch}.json" \
              "${IMAGE}@${digest}"
          done

      - name: Verify NIST SP 800-190 image-control attestation
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-image.yaml@${{ github.ref }}
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/attestations/verified
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported NIST 800-190 verification architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            out="dist/attestations/verified/nist-800-190.${arch}.jsonl"
            cosign verify-attestation --type "${NIST_800_190_PREDICATE_TYPE}" "${IMAGE}@${digest}" \
              --certificate-identity "${CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "${out}"
            test -s "${out}"
          done

      - name: Attest STIG ARF predicates
        env:
          COSIGN_YES: "true"
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported STIG attestation architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            cosign attest --type "${STIG_ARF_PREDICATE_TYPE}" \
              --predicate "dist/stig/${arch}/stig-arf.base-micro.${arch}.json" \
              "${IMAGE}@${digest}"
          done

      - name: Verify STIG ARF attestation
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-image.yaml@${{ github.ref }}
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail

          mkdir -p dist/stig/verified
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported STIG verification architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            out="dist/stig/verified/stig-arf.${arch}.jsonl"
            cosign verify-attestation --type "${STIG_ARF_PREDICATE_TYPE}" "${IMAGE}@${digest}" \
              --certificate-identity "${CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "${out}"
            test -s "${out}"
          done

      - name: Attest OpenVEX documents
        env:
          COSIGN_YES: "true"
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          vex_docs=(vex/*.json)
          if (( ${#vex_docs[@]} == 0 )); then
            echo "No OpenVEX documents present; nothing to attest."
            exit 0
          fi

          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported OpenVEX attestation architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            for vex_doc in "${vex_docs[@]}"; do
              cosign attest --type openvex --predicate "${vex_doc}" "${image_ref}"
            done
          done

      - name: Verify OpenVEX attestation
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-image.yaml@${{ github.ref }}
          IMAGE: ${{ steps.image.outputs.image }}
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          vex_docs=(vex/*.json)
          if (( ${#vex_docs[@]} == 0 )); then
            echo "No OpenVEX documents present; nothing to verify."
            exit 0
          fi

          mkdir -p dist/vex
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported OpenVEX verification architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"
            out="dist/vex/verified-openvex.${arch}.jsonl"
            cosign verify-attestation --type openvex "${image_ref}" \
              --certificate-identity "${CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "${out}"
            test -s "${out}"
          done

  slsa-provenance:
    name: slsa l3 provenance
    needs: publish
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.publish.outputs.image }}
      digest: ${{ needs.publish.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}


  rekor-rollup:
    name: rekor roll-up
    needs:
      - publish
      - slsa-provenance
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    env:
      EXPECTED_BUILDER_ID: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v2.1.0"
      PUBLISH_CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/publish-image.yaml@${{ github.ref }}
      SLSA_CERTIFICATE_IDENTITY: "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@refs/tags/v2.1.0"
      IMAGE: ${{ needs.publish.outputs.image }}
      IMAGE_REF: ${{ needs.publish.outputs.ref }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR for verification
        env:
          GHCR_TOKEN: ${{ github.token }}
          REGISTRY_USER: ${{ github.actor }}
        run: |
          printf '%s' "${GHCR_TOKEN}" \
            | docker login ghcr.io \
                --username "${REGISTRY_USER}" \
                --password-stdin

      - name: Resolve platform image digests
        id: platform_digests
        env:
          IMAGE_REF: ${{ needs.publish.outputs.ref }}
        run: |
          set -euo pipefail

          mkdir -p dist/rekor
          docker buildx imagetools inspect --raw "${IMAGE_REF}" > dist/rekor/image-index.json
          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import json

          with open("dist/rekor/image-index.json", encoding="utf-8") as handle:
              index = json.load(handle)

          found = {}
          for descriptor in index.get("manifests") or []:
              platform = descriptor.get("platform") or {}
              if platform.get("os") != "linux":
                  continue
              arch = platform.get("architecture")
              digest = descriptor.get("digest")
              if arch in {"amd64", "arm64"} and digest:
                  found[arch] = digest

          missing = sorted({"amd64", "arm64"} - set(found))
          if missing:
              raise SystemExit("missing platform digest(s): " + ", ".join(missing))

          for arch in ("amd64", "arm64"):
              print(f"{arch}_digest={found[arch]}")
          PY

      - name: Verify Rekor roll-up
        env:
          AMD64_DIGEST: ${{ steps.platform_digests.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platform_digests.outputs.arm64_digest }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p dist/rekor
          published_ref="${IMAGE_REF}"

          verify_rekor() {
            local kind="$1"
            local path="$2"
            python tools/assert-cosign-rekor.py --kind "${kind}" "${path}"
          }

          assert_attestation_tlog() {
            local kind="$1"
            local path="$2"
            python - "${kind}" "${path}" <<'PY'
          import json
          import sys
          from pathlib import Path

          kind = sys.argv[1]
          path = Path(sys.argv[2])
          raw = path.read_text(encoding="utf-8").strip()
          if not raw:
              raise SystemExit(f"{kind}: cosign verify-attestation produced no DSSE output")
          try:
              loaded = json.loads(raw)
              records = loaded if isinstance(loaded, list) else [loaded]
          except json.JSONDecodeError:
              records = [json.loads(line) for line in raw.splitlines() if line.strip()]

          if not records:
              raise SystemExit(f"{kind}: cosign verify-attestation produced no DSSE records")

          missing = []
          for index, record in enumerate(records, start=1):
              if not isinstance(record, dict):
                  missing.append(index)
                  continue
              payload = record.get("payload")
              signatures = record.get("signatures")
              if not isinstance(payload, str) or not payload:
                  missing.append(index)
                  continue
              if not isinstance(signatures, list) or not signatures:
                  missing.append(index)
                  continue
              if not all(isinstance(signature, dict) and signature.get("sig") for signature in signatures):
                  missing.append(index)

          if missing:
              raise SystemExit(f"{kind}: missing DSSE payload/signature field(s) in record(s): {missing}")

          print(
              f"{kind}: cosign verify-attestation succeeded with Rekor transparency log enabled; "
              f"DSSE envelope(s): {len(records)}"
          )
          PY
          }

          cosign verify "${published_ref}" \
            --certificate-identity "${PUBLISH_CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > dist/rekor/cosign-signature.index.json
          verify_rekor "cosign signature index" dist/rekor/cosign-signature.index.json

          cosign verify-attestation --type slsaprovenance "${published_ref}" \
            --certificate-identity "${SLSA_CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            > dist/rekor/slsa-provenance.index.json
          assert_attestation_tlog "SLSA provenance index" dist/rekor/slsa-provenance.index.json
          python tools/assert-slsa-builder-id.py \
            --attestation dist/rekor/slsa-provenance.index.json \
            --builder-id "${EXPECTED_BUILDER_ID}"

          vex_docs=(vex/*.json)
          for arch in amd64 arm64; do
            case "${arch}" in
              amd64) digest="${AMD64_DIGEST}" ;;
              arm64) digest="${ARM64_DIGEST}" ;;
              *)
                echo "unsupported Rekor roll-up architecture: ${arch}" >&2
                exit 1
                ;;
            esac

            image_ref="${IMAGE}@${digest}"

            cosign verify "${image_ref}" \
              --certificate-identity "${PUBLISH_CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "dist/rekor/cosign-signature.${arch}.json"
            verify_rekor "cosign signature ${arch}" "dist/rekor/cosign-signature.${arch}.json"

            cosign verify-attestation --type spdxjson "${image_ref}" \
              --certificate-identity "${PUBLISH_CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "dist/rekor/spdx.${arch}.jsonl"
            assert_attestation_tlog "SPDX SBOM ${arch}" "dist/rekor/spdx.${arch}.jsonl"

            cosign verify-attestation --type cyclonedx "${image_ref}" \
              --certificate-identity "${PUBLISH_CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "dist/rekor/cyclonedx.${arch}.jsonl"
            assert_attestation_tlog "CycloneDX SBOM ${arch}" "dist/rekor/cyclonedx.${arch}.jsonl"

            cosign verify-attestation --type "${NIST_800_190_PREDICATE_TYPE}" "${image_ref}" \
              --certificate-identity "${PUBLISH_CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "dist/rekor/nist-800-190.${arch}.jsonl"
            assert_attestation_tlog "NIST 800-190 image ${arch}" "dist/rekor/nist-800-190.${arch}.jsonl"

            cosign verify-attestation --type "${STIG_ARF_PREDICATE_TYPE}" "${image_ref}" \
              --certificate-identity "${PUBLISH_CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              > "dist/rekor/stig-arf.${arch}.jsonl"
            assert_attestation_tlog "STIG ARF ${arch}" "dist/rekor/stig-arf.${arch}.jsonl"

            if (( ${#vex_docs[@]} > 0 )); then
              cosign verify-attestation --type openvex "${image_ref}" \
                --certificate-identity "${PUBLISH_CERTIFICATE_IDENTITY}" \
                --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
                > "dist/rekor/openvex.${arch}.jsonl"
              assert_attestation_tlog "OpenVEX ${arch}" "dist/rekor/openvex.${arch}.jsonl"
            else
              echo "OpenVEX ${arch}: no vex/*.json present; no OpenVEX attestation expected."
            fi
          done
