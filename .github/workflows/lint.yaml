# Purpose: PR/push lint gate — installs pinned pre-commit and runs all hooks with --show-diff-on-failure.
# Role: gate
# Micro-container candidate: yes — install+run pre-commit fits cleanly behind one pinned micro-container action.

name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install pre-commit
        run: |
          python -m pip install --user --disable-pip-version-check pre-commit==4.6.0
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Run lint hooks
        run: pre-commit run --all-files --show-diff-on-failure
