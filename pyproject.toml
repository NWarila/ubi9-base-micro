[tool.ruff]
target-version = "py312"
line-length = 120
src = ["tools"]

[tool.ruff.lint]
select = [
  "A",
  "ARG",
  "B",
  "C4",
  "E",
  "F",
  "I",
  "N",
  "PERF",
  "PIE",
  "PLC",
  "PLE",
  "PLW",
  "PTH",
  "RET",
  "RUF",
  "SIM",
  "UP",
  "W",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.12"
files = ["tools"]
explicit_package_bases = true
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
pretty = true
show_error_codes = true
